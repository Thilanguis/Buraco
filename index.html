<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Buraco – Firebase</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#050505" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <style>
      :root {
        --bg-main: #020617;
        --bg-panel-soft: rgba(15, 23, 42, 0.92);
        --accent: #22c55e;
        --accent-strong: #16a34a;
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #050505;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      .app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* ================= OVERLAY DE TOQUE INVISÍVEL ================= */
      #startOverlay {
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: 100001;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .tap-text {
        color: #facc15;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
        animation: pulseTextTap 1.5s infinite alternate;
        opacity: 0.8;
      }
      @keyframes pulseTextTap {
        0% {
          opacity: 0.3;
          transform: scale(0.98);
        }
        100% {
          opacity: 1;
          transform: scale(1.02);
        }
      }

      /* ================= VÍDEO DE INTRODUÇÃO ================= */
      #introVideo {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 100000;
        display: none;
        background: #000;
      }

      /* ================= TELA DE CARREGAMENTO (GLITCH) ================= */
      #loadingScreen {
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: 99999;
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .glitch-title {
        font-size: 2rem;
        color: #facc15;
        letter-spacing: 6px;
        text-transform: uppercase;
        font-weight: 900;
        text-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
        animation: pulseText 2s infinite alternate;
      }
      .loading-bar {
        width: 150px;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-progress {
        width: 0%;
        height: 100%;
        background: #facc15;
        animation: loadBar 2s ease-in-out forwards;
      }
      @keyframes pulseText {
        0% {
          opacity: 0.7;
          transform: scale(0.98);
        }
        100% {
          opacity: 1;
          transform: scale(1.02);
        }
      }
      @keyframes loadBar {
        0% {
          width: 0%;
        }
        100% {
          width: 100%;
        }
      }

      /* ================= MENU PRINCIPAL ================= */
      #configSection {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.5), rgba(5, 5, 5, 0.95)), url('icon-512.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: none;
        flex-direction: column;
        justify-content: center;
      }

      .section {
        background: rgba(10, 10, 15, 0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(250, 204, 21, 0.2);
        border-radius: 16px;
        padding: 30px;
        max-width: 420px;
        margin: 0 auto;
        width: 100%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      }

      .section-header h2 {
        margin-top: 0;
        color: #facc15;
        text-align: center;
        font-size: 26px;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      }
      .section-header small {
        display: block;
        text-align: center;
        color: #9ca3af;
        margin-bottom: 20px;
        font-size: 11px;
      }

      label {
        font-size: 11px;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 4px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        transition: all 0.3s;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #facc15;
        box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 99px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        background: var(--accent-strong);
        color: white;
        margin-top: 5px;
      }

      #startBtn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #facc15;
        font-weight: 900;
        cursor: pointer;
        background: linear-gradient(135deg, #b45309 0%, #78350f 100%);
        color: #facc15;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 15px;
        transition: all 0.3s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }

      #startBtn:hover {
        background: linear-gradient(135deg, #d97706 0%, #92400e 100%);
        box-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
        transform: translateY(-2px);
      }

      @keyframes smoothTableReveal {
        0% {
          opacity: 0;
          filter: brightness(0.2);
        }
        100% {
          opacity: 1;
          filter: brightness(1);
        }
      }

      /* ================= JOGO ================= */
      #gameSection {
        flex: 1;
        display: none;
        flex-direction: column;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: radial-gradient(circle at center, #15803d 0%, #14532d 100%);
        animation: smoothTableReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .board {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        padding-bottom: 0;
      }

      .board-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .board-top {
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        height: 50px;
        z-index: 20;
      }
      .current-player-chip {
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 10px;
        border-radius: 20px;
        color: #fff;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .current-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
      }

      .morto-area {
        display: flex;
        gap: 8px;
      }
      .morto-container {
        position: relative;
        width: 30px;
        height: 44px;
        opacity: 1;
      }

      .morto-label {
        position: absolute;
        bottom: -12px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        color: #e5e7eb;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }

      .morto-container.used {
        opacity: 0;
      }
      .morto-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 4px;
        background: #991b1b;
        border: 1px solid #fff;
      }
      .morto-card-back.offset {
        transform: translate(3px, -3px);
      }

      .opponent-hand {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        pointer-events: none;
        font-size: 10px;
        color: #e5e7eb;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }

      .opponent-hand-top {
        top: 26px;
        left: 50%;
        transform: translateX(-50%);
      }

      .opponent-hand-left,
      .opponent-hand-right {
        top: 50%;
        transform: translateY(-50%);
      }

      .opponent-hand-left {
        left: 10px;
        align-items: center;
      }

      .opponent-hand-right {
        right: 10px;
        align-items: center;
      }

      .opponent-label {
        font-size: 11px;
        opacity: 0.85;
        background: rgba(15, 23, 42, 0.9);
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
      }

      .opponent-cards {
        display: flex;
        gap: 3px;
        min-width: 30px;
        min-height: 44px;
      }

      .opponent-card-back {
        width: 30px;
        height: 44px;
        border-radius: 6px;
        background: #7f1d1d;
        border: 1px solid #3d0a0a;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
      }

      .opponent-hand-top .opponent-card-back {
        margin-left: -14px;
      }
      .opponent-hand-top .opponent-card-back:first-child {
        margin-left: 0;
      }

      .opponent-hand-left .opponent-cards,
      .opponent-hand-right .opponent-cards {
        flex-direction: column;
        align-items: center;
        min-width: 44px;
        min-height: 30px;
      }

      .opponent-hand-left .opponent-card-back,
      .opponent-hand-right .opponent-card-back {
        margin-top: -12px;
      }

      .opponent-hand-left .opponent-card-back:first-child,
      .opponent-hand-right .opponent-card-back:first-child {
        margin-top: 0;
      }

      .opponent-hand-left .opponent-card-back {
        transform: rotate(90deg);
        transform-origin: center center;
      }
      .opponent-hand-right .opponent-card-back {
        transform: rotate(-90deg);
        transform-origin: center center;
      }

      .opponent-hand-left {
        top: 45%;
        left: 5px;
        transform: translateY(-50%);
      }
      .opponent-hand-left .opponent-card-back {
        transform: rotate(90deg);
        margin-bottom: -15px;
      }

      .opponent-hand-right {
        top: 45%;
        right: 5px;
        transform: translateY(-50%);
      }
      .opponent-hand-right .opponent-card-back {
        transform: rotate(-90deg);
        margin-bottom: -15px;
      }

      .board-melds {
        flex: 0 0 auto;
        min-height: 60px;
        width: 100%;
        max-width: 760px;
        margin: 70px auto 4px;
        padding: 6px 10px;
        display: flex;
        align-items: stretch;
        gap: 20px;
        background: rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        overflow: visible;
      }

      .board-melds .grow {
        flex: 1 1 0;
        width: calc(50% - 10px);
        min-width: 0;
        display: flex;
        flex-direction: column;
        background: rgba(15, 23, 42, 0.85);
        border-radius: 10px;
        padding: 6px 10px;
      }

      .carta.mini:last-child {
        margin-right: 0 !important;
      }

      .board-melds .grow + .grow {
        border-left: 1px dashed rgba(148, 163, 184, 0.5) !important;
      }

      .meld-title {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #cbd5e1;
        margin-bottom: 4px;
      }

      .meld-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-content: flex-start;
        width: 100%;
        justify-content: flex-start;
        min-height: 52px;
        overflow-x: auto;
      }

      .team-panel {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .team-panel .meld-container {
        flex: 1;
        min-height: 52px;
      }

      .view-team0 #teamPanel2 {
        transform: rotate(180deg);
        transform-origin: center;
      }
      .view-team1 #teamPanel1 {
        transform: rotate(180deg);
        transform-origin: center;
      }

      .board-melds .grow {
        overflow: hidden;
      }

      .meld-line {
        max-width: 100%;
      }

      .meld-line {
        background: rgba(0, 0, 0, 0.45);
        border-radius: 6px;
        padding: 4px 6px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        border: 1px solid transparent;
        flex: 0 1 auto;
        min-width: 140px;
      }

      .meld-line.selected-meld {
        border-color: #facc15;
        background: rgba(250, 204, 21, 0.2);
      }

      .meld-line-cards {
        display: flex;
        align-items: center;
        height: 42px;
        flex-wrap: nowrap;
      }

      .meld-meta {
        font-size: 10px;
        color: #e5e7eb;
        margin-top: 4px;
        text-align: center;
      }

      .board-middle {
        display: flex;
        justify-content: center;
        gap: 30px;
        align-items: center;
        padding: 10px 0;
        flex-shrink: 0;
        z-index: 5;
      }

      .pile-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        cursor: pointer;
      }

      .pile-card {
        width: 55px;
        height: 80px;
        border-radius: 6px;
        background: transparent;
        border: 0;
        box-shadow: none;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: visible;
      }

      #drawStockBtn .pile-card::before,
      #drawStockBtn .pile-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 6px;
        border: 2px solid #fff;
        box-sizing: border-box;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
      }

      #drawStockBtn .pile-card::before {
        transform: translate(4px, -3px);
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 42%), radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0) 55%),
          repeating-linear-gradient(45deg, rgba(192, 192, 192, 0.22) 0 6px, rgba(0, 0, 0, 0) 6px 14px), repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.22) 0 7px, rgba(0, 0, 0, 0) 7px 16px), linear-gradient(135deg, #05071a, #1d4ed8);
      }

      #drawStockBtn .pile-card::after {
        transform: translate(0px, 0px);
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 42%), radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0) 55%),
          repeating-linear-gradient(45deg, rgba(255, 215, 0, 0.22) 0 6px, rgba(0, 0, 0, 0) 6px 14px), repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.22) 0 7px, rgba(0, 0, 0, 0) 7px 16px), linear-gradient(135deg, #140007, #b91c1c);
      }

      .pile-card.discard-pile {
        background: transparent;
        border: 2px dashed rgba(255, 255, 255, 0.4);
        box-shadow: none;
      }

      /* ================= ESTILO UNIFICADO DE TODAS AS CARTAS ================= */
      .carta-canto {
        line-height: 1.1;
        font-weight: bold;
      }
      .carta-canto.top {
        align-self: flex-start;
        text-align: center;
      }
      .carta-canto.bottom {
        align-self: flex-end;
        text-align: center;
        transform: rotate(180deg);
      }
      .carta-meio {
        font-size: 24px;
        align-self: center;
        line-height: 1;
      }

      .discard-face {
        width: 100%;
        height: 100%;
        background: #f3f4f6;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2px 4px;
        font-size: 14px;
        color: #000;
        overflow: hidden; /* Corta o que sobrar sem precisar de !important */
      }

      .discard-face .carta-canto {
        font-size: 11px;
        padding: 0 2px;
      }

      .discard-face .carta-meio {
        font-size: 24px;
      }

      .pile-info {
        font-size: 10px;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        padding: 2px 6px;
        border-radius: 10px;
        margin-top: 6px;
        z-index: 10;
      }

      .player-interface {
        background: linear-gradient(to top, rgba(2, 6, 23, 0.95) 0%, rgba(2, 6, 23, 0.8) 60%, transparent 100%);
        padding: 5px 10px 10px 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        z-index: 50;
        width: 100%;
        flex-shrink: 0;
      }

      #message {
        text-align: center;
        font-size: 11px;
        color: #facc15;
        font-weight: bold;
        height: 15px;
        text-shadow: 0 1px 2px black;
      }

      .player-actions {
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .player-actions button {
        width: auto;
        padding: 8px 12px;
        font-size: 11px;
        margin: 0;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      #meldBtn {
        background: #059669;
      }

      #discardBtn {
        background: #be123c;
      }

      #takeDeadBtn {
        background: #4f46e5;
      }

      #endGameBtn {
        background: #333;
        padding: 8px;
      }

      .hand-container {
        display: flex;
        justify-content: center;
        overflow-x: auto;
        padding: 15px 10px 5px 10px;
        min-height: 90px;
        flex-shrink: 0;
      }

      .cards-row {
        display: flex;
        align-items: flex-end;
        padding-right: 20px;
      }

      .carta {
        width: 60px;
        height: 90px;
        background: #fff;
        border-radius: 5px;
        border: 1px solid #000;
        position: relative;
        flex-shrink: 0;
        cursor: pointer;
        box-shadow: -1px 1px 4px rgba(0, 0, 0, 0.3);
        margin-right: -30px;
        transition:
          transform 0.1s,
          margin-right 0.1s;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2px 4px;
        font-size: 14px;
        font-weight: bold;
        overflow: hidden;
      }

      .carta:last-child {
        margin-right: 0;
      }

      #handContainer .carta:hover,
      #handContainer .carta.selected {
        margin-right: 0;
        z-index: 100;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      }

      .carta.selected {
        border: 2px solid #facc15;
      }

      .fly-card {
        position: fixed;
        left: 0;
        top: 0;
        margin: 0 !important;
        z-index: 9999;
        pointer-events: none;
        transform-origin: top left;
        will-change: transform, opacity;
      }

      .back-red {
        border: 2px solid #fff !important;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 42%), radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0) 55%),
          repeating-linear-gradient(45deg, rgba(255, 215, 0, 0.22) 0 6px, rgba(0, 0, 0, 0) 6px 14px), repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.22) 0 7px, rgba(0, 0, 0, 0) 7px 16px), linear-gradient(135deg, #140007, #b91c1c) !important;
      }

      .back-blue {
        border: 2px solid #fff !important;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 42%), radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0) 55%),
          repeating-linear-gradient(45deg, rgba(192, 192, 192, 0.22) 0 6px, rgba(0, 0, 0, 0) 6px 14px), repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.22) 0 7px, rgba(0, 0, 0, 0) 7px 16px), linear-gradient(135deg, #05071a, #1d4ed8) !important;
      }

      .fly-card.back {
        border: 2px solid #fff !important;
        box-sizing: border-box;
      }
      .fly-card.back.back-red {
        background: unset;
      }
      .fly-card.back.back-blue {
        background: unset;
      }
      .fly-card.back {
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 42%), radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0) 55%),
          repeating-linear-gradient(45deg, rgba(255, 215, 0, 0.22) 0 6px, rgba(0, 0, 0, 0) 6px 14px), repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.22) 0 7px, rgba(0, 0, 0, 0) 7px 16px), linear-gradient(135deg, #140007, #b91c1c) !important;
      }
      .fly-card.back.back-blue {
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0) 42%), radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0) 55%),

        const m = {};

        return m;

      const IDX_HIGH = buildRankIndex(RANKS_SEQ);
      const IDX_LOW = buildRankIndex(RANKS_SEQ_LOW);

      function missingRankBetween(a, b) {
        const ah = IDX_HIGH[a],
          bh = IDX_HIGH[b];
        if (ah != null && bh === ah + 2) return RANKS_SEQ[ah + 1];

        const al = IDX_LOW[a],
          bl = IDX_LOW[b];
        if (al != null && bl === al + 2) return RANKS_SEQ_LOW[al + 1];

        return null;
      }

      function pushWildToEdge(meld, wildIdx) {
        const wild = meld[wildIdx];
        let cand = meld.slice();
        cand.splice(wildIdx, 1);
        cand.push(wild);
        if (isValidSequenceMeld(cand)) return cand;

        cand = meld.slice();
        cand.splice(wildIdx, 1);
        cand.unshift(wild);
        if (isValidSequenceMeld(cand)) return cand;

        return null;
      }

      function autoSwapWildWhenFillingGap(meld) {
        if (!meld || meld.length < 4) return false;

        const wIdx = meld.findIndex((c, i) => (c?.joker || c?.rank === '2') && isWildcard(c, meld) && i > 0 && i < meld.length - 1);
        if (wIdx === -1) return false;

        const left = meld[wIdx - 1];
        const right = meld[wIdx + 1];
        if (!left || !right) return false;
        if (left.joker || right.joker) return false;
        if (left.suit !== right.suit) return false;

        const needed = missingRankBetween(left.rank, right.rank);
        if (!needed) return false;

        const naturalIdx = meld.findIndex((c, i) => i !== wIdx && !c.joker && c.rank === needed && c.suit === left.suit);
        if (naturalIdx === -1) return false;

        const wild = meld[wIdx];
        const natural = meld[naturalIdx];

        if (!wild.joker && wild.rank === '2') wild.forceWild = true;

        meld[wIdx] = natural;
        meld.splice(naturalIdx, 1);

        const insertAt = naturalIdx < wIdx ? wIdx - 1 : wIdx;
        meld.splice(insertAt, 0, wild);

        const pushed = pushWildToEdge(meld, meld.indexOf(wild));
        if (pushed) {
          meld.splice(0, meld.length, ...pushed);
        }

        return true;
      }

          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) audioCtx = new AudioContext();

      function meldKey(teamId, meldIdx) {

      function parseMeldKey(key) {
        if (!key) return null;

        if (Number.isNaN(teamId) || Number.isNaN(meldIdx)) return null;

      }

      function meldCardsRect(teamId, meldIdx) {
        const key = meldKey(teamId, meldIdx);

      function clearMovingWild(msg = null) {

      function pickWildFromMeld(teamId, meldIdx, cardIdx) {
        if (!state || state.finished) return;

        const myTurn = state.currentPlayer === myPlayerIndex;
        if (!myTurn || !state.hasDrawnThisTurn) {
          showMessage('Só dá pra mover depois de comprar e na sua vez.');

        const me = state.players[myPlayerIndex];

          showMessage('Você só mexe nos jogos do SEU time.');
          return;
        }

        const meld = state.teams?.[teamId]?.melds?.[meldIdx];
        if (!meld || !meld[cardIdx]) return;

        const card = meld[cardIdx];
        if (!isMovableTwoOrJoker(card)) {
          showMessage('Só pode mover JOKER ou 2.');
          return;
        }

        const isTrapped = cardIdx > 0 && cardIdx < meld.length - 1;
        if (isTrapped) {
          showMessage('O coringa está cobrindo um buraco e não pode ser movido.');
          return;
        }

        if (movingWild && movingWild.fromTeamId === teamId && movingWild.fromMeldIndex === meldIdx && movingWild.fromCardIndex === cardIdx) {
          clearMovingWild('Movimento cancelado.');
          return;
        }

        ensureCardId(card);
        movingWild = {
          fromTeamId: teamId,
          fromMeldIndex: meldIdx,
          fromCardIndex: cardIdx,
          card: packCard(card),

        showMessage('Clique em "Mover 2/Joker". (Selecionar destino é opcional)');

      async function movePickedWildToSelectedMeld() {
        if (!state || state.finished) return;
        if (!ensureMyTurn()) return;
        if (!state.hasDrawnThisTurn) {
          showMessage('Compre primeiro.');
          return;
        }

        if (!movingWild) {
          showMessage('Clique num 2/JOKER no jogo pra selecionar.');

        const me = state.players[myPlayerIndex];
        const myTeamId = me.teamId;

        const destParsed = parseMeldKey(selectedMeldTarget) || { teamId: movingWild.fromTeamId, meldIdx: movingWild.fromMeldIndex };

        if (!destParsed || destParsed.teamId !== myTeamId) {
          showMessage('Selecione um jogo DESTINO do seu time.');
          return;
        }

        const { teamId: toTeamId, meldIdx: toMeldIdx } = destParsed;

        const fromTeamId = movingWild.fromTeamId;
        const fromMeldIdx = movingWild.fromMeldIndex;
        const fromCardIdx = movingWild.fromCardIndex;

        if (fromTeamId !== myTeamId) {
          showMessage('Origem não é do seu time (bug de seleção).');
          clearMovingWild();
          return;
        }

        const team = state.teams[myTeamId];
        const fromMeld = team?.melds?.[fromMeldIdx];
        const toMeld = team?.melds?.[toMeldIdx];

        if (!fromMeld || !toMeld) {
          showMessage('Jogo origem/destino inválido.');
          clearMovingWild();
          return;
        }

        const rawCard = fromMeld[fromCardIdx];
        if (!rawCard || !isMovableTwoOrJoker(rawCard)) {
          showMessage('Essa carta não existe mais no jogo origem.');
          clearMovingWild();
          return;
        }
        ensureCardId(rawCard);
        const cardId = rawCard.id;
        const actualFromIdx = fromMeld.findIndex((c) => c && c.id === cardId);
        const fromIdx = actualFromIdx >= 0 ? actualFromIdx : fromCardIdx;
        const card = fromMeld[fromIdx];

        const sameMeld = fromMeldIdx === toMeldIdx;

        if (sameMeld) {
          const targetIndex = fromIdx === fromMeld.length - 1 ? 0 : fromMeld.length - 1;
          const after = fromMeld.slice();
          const [moved] = after.splice(fromIdx, 1);
          if (targetIndex === 0) after.unshift(moved);
          else after.push(moved);

          if (after.length < 3) {
            showMessage('Não pode quebrar o jogo (mínimo 3 cartas).');
            return;
          }
          if (!isValidSequenceMeld(after)) {
            showMessage('Mover assim deixa o jogo inválido.');
            return;
          }
        } else {
          const fromAfter = fromMeld.slice();
          fromAfter.splice(fromIdx, 1);

          const toAfter = toMeld.slice();
          toAfter.push(card);

          if (fromAfter.length < 3) {
            showMessage('Não pode quebrar o jogo origem (mínimo 3 cartas).');
            return;
          }
          if (!isValidSequenceMeld(fromAfter)) {
            showMessage('Remover isso quebra o jogo origem.');
            return;
          }
          if (!isValidSequenceMeld(toAfter)) {
            showMessage('Mover pra esse destino deixa o jogo inválido.');
            return;
          }
        }

        const fromEl = miniCardElByMeld(myTeamId, fromMeldIdx, fromIdx);
        const fromRect = fromEl ? getRect(fromEl) : meldCardsRect(myTeamId, fromMeldIdx);
        const keyTo = meldKey(myTeamId, toMeldIdx);

        let toRect = null;
        if (sameMeld) {
          const targetIndex = fromIdx === fromMeld.length - 1 ? 0 : fromMeld.length - 1;
          if (targetIndex === 0) {
            const meldEl = meldElByKey(keyTo);

            toRect = r ? { left: r.left + 4, top: r.top + 4, width: 28, height: 40 } : meldCardsRect(myTeamId, toMeldIdx);
          } else {
            const baseDrop = meldDropRect(keyTo, 0);
            toRect = baseDrop || meldCardsRect(myTeamId, toMeldIdx);
          }
        } else {
          const baseDrop = meldDropRect(keyTo, 0);
          toRect = baseDrop || meldCardsRect(myTeamId, toMeldIdx);

        if (fromEl) fromEl.style.visibility = 'hidden';
        if (fromRect && toRect) {

      function playCanastraSfx(kind) {
        if (!audioUnlocked) return;

          a.pause();

      function playTone(freq, t0, dur, vol = 0.12, type = 'sine') {
        if (!audioUnlocked || !audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);

        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        o.connect(g).connect(audioCtx.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.02);
      }

      let canastraMemPrimed = false;
      const canastraKindMem = new Map();

      function resetCanastraSfxMemory() {
        canastraKindMem.clear();
        canastraMemPrimed = false;
      }

      function computeMeldKindMap() {
        const m = new Map();
        if (!state?.teams) return m;

        for (const t of state.teams) {
          (t.melds || []).forEach((meld, idx) => {
            m.set(`${t.id}:${idx}`, classifyMeldForUi(meld).kind);
          });
        }
        return m;
      }

      function syncCanastraSfxFromState() {
        if (!state?.teams) return;

        const curr = computeMeldKindMap();

        if (!canastraMemPrimed) {
          canastraKindMem.clear();
          for (const [k, v] of curr) canastraKindMem.set(k, v);
          canastraMemPrimed = true;
          return;
        }

        for (const [k, kind] of curr) {
          const prev = canastraKindMem.get(k);
          const isCanastra = kind !== 'simple';
          const wasSimple = prev === 'simple';
          const wasMissing = prev == null;
          const changedKind = prev != null && prev !== kind;

          if ((wasSimple && isCanastra) || (wasMissing && isCanastra) || (changedKind && isCanastra)) {
            playCanastraSfx(kind);
          }
          canastraKindMem.set(k, kind);
        }

        for (const key of Array.from(canastraKindMem.keys())) {
          if (!curr.has(key)) canastraKindMem.delete(key);
        }
      }

      let lastBoughtCardId = null;
      let lastBoughtTimer = null;

      function newActionId() {
        return `a_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function packCard(c) {
        if (!c) return null;

      function ensureCardId(card) {
        if (!card) return null;

      function flashBoughtCard(card) {
        const id = ensureCardId(card);
